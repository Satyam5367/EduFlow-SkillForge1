<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6C63FF" />
    <meta name="description" content="EduFlow — Learn from the best instructors. Build real skills." />
    <meta property="og:title" content="EduFlow LMS" />
    <meta property="og:description" content="The modern platform for online learning." />
    <title>EduFlow — Learn Anything</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --primary: #6C63FF;
        --primary-dark: #5A52D5;
        --secondary: #10B981;
        --accent: #F59E0B;
        --danger: #EF4444;
        --bg: #0F0E17;
        --bg-card: #1A1929;
        --bg-elevated: #221F35;
        --text: #FFFFFE;
        --text-muted: #A7A9BE;
        --border: rgba(255,255,255,0.08);
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }
      a { text-decoration: none; color: inherit; }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run EduFlow.</noscript>
    <div id="root"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </body>
</html>
