version: '3.9'

services:
  # ─── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: eduflow_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: eduflow
    volumes:
      - mongo_data:/data/db
    networks:
      - eduflow_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: eduflow_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://root:rootpassword@mongo:27017/eduflow?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
      JWT_EXPIRE: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - eduflow_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
        REACT_APP_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    container_name: eduflow_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - eduflow_net

# ─── Volumes & Networks ────────────────────────────────────
volumes:
  mongo_data:
    driver: local

networks:
  eduflow_net:
    driver: bridge
